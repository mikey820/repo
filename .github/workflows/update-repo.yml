name: Update Repository

on:
  workflow_dispatch:
  repository_dispatch:
    types: [new-release]
  schedule:
    - cron: '0 0 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dpkg-dev
        run: sudo apt-get install -y dpkg-dev

      - name: Download latest .deb files
        run: |
          mkdir -p debs
          rm -f debs/*.deb
          gh release download \
            --repo mikey820/PleaseDontStopTheMusic \
            --pattern "*.deb" \
            --dir debs \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate Packages index
        run: |
          dpkg-scanpackages --multiversion debs/ > Packages

          # Inject depiction URLs (avoids needing to rebuild .deb files)
          python3 - <<'EOF'
import re

DEPICTION = "https://mikey820.github.io/repo/depiction/com.mikey820.pleasedontstopthemusic.html"
SILEO     = "https://mikey820.github.io/repo/depiction/com.mikey820.pleasedontstopthemusic.json"

with open("Packages", "r") as f:
    content = f.read()

def inject(block):
    if "Package: com.mikey820.pleasedontstopthemusic" not in block:
        return block
    if "Depiction:" not in block:
        block = block.rstrip("\n") + f"\nDepiction: {DEPICTION}\nSileoDepiction: {SILEO}\n"
    return block

blocks = re.split(r'\n\n+', content.strip())
patched = "\n\n".join(inject(b) for b in blocks) + "\n\n"

with open("Packages", "w") as f:
    f.write(patched)
EOF

          gzip -c9 Packages > Packages.gz
          bzip2 -c9 Packages > Packages.bz2
          xz -c9 Packages > Packages.xz

      - name: Generate Sileo depiction
        run: |
          mkdir -p depiction

          README=$(gh api repos/mikey820/PleaseDontStopTheMusic/contents/README.md \
            --jq '.content' | base64 -d)

          CHANGELOG=$(gh api repos/mikey820/PleaseDontStopTheMusic/releases \
            --jq '[.[] | "### " + .tag_name + "\n\n" + (.body // "No notes.")] | join("\n\n---\n\n")')

          jq -n \
            --arg readme "$README" \
            --arg changelog "$CHANGELOG" \
            '{
              minVersion: "0.1",
              class: "DepictionTabView",
              tintColor: "#5B5DE7",
              tabs: [
                {
                  tabname: "Details",
                  class: "DepictionStackView",
                  views: [
                    {
                      class: "DepictionMarkdownTextView",
                      markdown: $readme,
                      useSpacing: true
                    }
                  ]
                },
                {
                  tabname: "Changelog",
                  class: "DepictionStackView",
                  views: [
                    {
                      class: "DepictionMarkdownTextView",
                      markdown: $changelog,
                      useSpacing: true
                    }
                  ]
                },
                {
                  tabname: "Support",
                  class: "DepictionStackView",
                  views: [
                    {
                      class: "DepictionTableButtonView",
                      title: "GitHub Repository",
                      action: "https://github.com/mikey820/PleaseDontStopTheMusic",
                      openExternal: true
                    }
                  ]
                }
              ]
            }' > depiction/com.mikey820.pleasedontstopthemusic.json
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update Release date
        run: |
          DATE=$(date -R)
          if grep -q "^Date:" Release; then
            sed -i "s/^Date:.*/Date: $DATE/" Release
          else
            echo "Date: $DATE" >> Release
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update repository [skip ci]"
            git push
          fi
