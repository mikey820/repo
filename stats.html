<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stats</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 32px;
      max-width: 480px;
      width: 100%;
    }
    h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 24px; color: #aaa; }
    .package { margin-bottom: 28px; }
    .pkg-name { font-weight: 700; font-size: 1.1rem; margin-bottom: 16px; }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #222;
      font-size: 0.9rem;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: #666; }
    .stat-value { font-weight: 600; font-variant-numeric: tabular-nums; }
    .stat-total .stat-value { color: #7dd3fc; font-size: 1.1rem; }
    .loading { color: #444; font-size: 0.9rem; text-align: center; padding: 24px 0; }
    .error { color: #ef4444; font-size: 0.875rem; text-align: center; padding: 24px 0; }
    .release { margin-bottom: 12px; }
    .release-tag { font-size: 0.75rem; color: #555; margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Download Stats</h1>
    <div id="content"><p class="loading">Loading…</p></div>
  </div>

  <script>
    fetch('https://api.github.com/repos/mikey820/PleaseDontStopTheMusic/releases')
      .then(r => r.json())
      .then(releases => {
        let grandTotal = 0;
        const totalByArch = {};
        const rows = [];

        releases.forEach(release => {
          let releaseTotal = 0;
          const releaseByArch = {};

          release.assets.forEach(asset => {
            if (!asset.name.endsWith('.deb')) return;
            const count = asset.download_count;
            const arch = asset.name.includes('arm64') ? 'arm64 (rootless)' : 'arm (rootful)';
            releaseTotal += count;
            releaseByArch[arch] = (releaseByArch[arch] || 0) + count;
            totalByArch[arch] = (totalByArch[arch] || 0) + count;
            grandTotal += count;
          });

          if (releaseTotal > 0 || Object.keys(releaseByArch).length > 0) {
            rows.push({ tag: release.tag_name, total: releaseTotal, byArch: releaseByArch });
          }
        });

        let html = '<div class="package"><div class="pkg-name">PleaseDontStopTheMusic</div>';

        html += '<div class="stat-row stat-total"><span class="stat-label">Total downloads</span><span class="stat-value">' + grandTotal.toLocaleString() + '</span></div>';
        Object.entries(totalByArch).forEach(([arch, count]) => {
          html += '<div class="stat-row"><span class="stat-label">' + arch + '</span><span class="stat-value">' + count.toLocaleString() + '</span></div>';
        });

        if (rows.length > 1) {
          html += '<br>';
          rows.forEach(r => {
            html += '<div class="release-tag">' + r.tag + '</div>';
            html += '<div class="stat-row"><span class="stat-label">Total</span><span class="stat-value">' + r.total.toLocaleString() + '</span></div>';
            Object.entries(r.byArch).forEach(([arch, count]) => {
              html += '<div class="stat-row"><span class="stat-label">' + arch + '</span><span class="stat-value">' + count.toLocaleString() + '</span></div>';
            });
          });
        }

        html += '</div>';
        document.getElementById('content').innerHTML = html;
      })
      .catch(() => {
        document.getElementById('content').innerHTML = '<p class="error">Failed to load stats.</p>';
      });
  </script>
</body>
</html>
