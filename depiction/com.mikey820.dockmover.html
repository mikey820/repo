<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DockMover</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.6;
      background: #fff;
      color: #1a1a1a;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1c1c1e; color: #f0f0f0; }
      code, pre { background: #2c2c2e !important; color: #f0f0f0 !important; }
      a { color: #5B8CF7; }
      hr { border-color: #3a3a3c; }
    }
    h1 { font-size: 1.4rem; margin-top: 0; }
    h2 { font-size: 1.15rem; margin-top: 1.4em; }
    h3 { font-size: 1rem; margin-top: 1.2em; }
    code {
      background: #f0f0f0;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.875em;
      font-family: "SF Mono", Menlo, monospace;
    }
    pre {
      background: #f0f0f0;
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
    }
    pre code { background: none; padding: 0; }
    img { max-width: 100%; height: auto; }
    hr { border: none; border-top: 1px solid #e0e0e0; margin: 1.5em 0; }
    #loading { color: #888; text-align: center; padding: 32px 0; }
    #error { color: #e53e3e; text-align: center; padding: 32px 0; }
  </style>
</head>
<body>
  <div id="loading">Loading…</div>
  <div id="content" style="display:none;"></div>
  <div id="error" style="display:none;">Failed to load. <a href="https://github.com/mikey820/DockMover">View on GitHub</a></div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    fetch('https://raw.githubusercontent.com/mikey820/DockMover/master/README.md')
      .then(r => r.text())
      .then(md => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = '';
        document.getElementById('content').innerHTML = marked.parse(md);
      })
      .catch(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = '';
      });
  </script>
</body>
</html>
